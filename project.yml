name: CryptoTrack
options:
  bundleIdPrefix: com.cryptotrack
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: true

targets:
  CryptoTrack:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: CryptoTrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cryptotrack.app
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        SWIFT_EMIT_LOC_STRINGS: true
      configs:
        debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        release:
          SWIFT_COMPILATION_MODE: wholemodule
