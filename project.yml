name: CryptoTrack
options:
  bundleIdPrefix: com.cryptotrack
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: true

targets:
  CryptoTrack:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: CryptoTrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cryptotrack.app
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        SWIFT_EMIT_LOC_STRINGS: true
        INFOPLIST_KEY_NSFaceIDUsageDescription: "앱 잠금 해제를 위해 Face ID를 사용합니다."
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        # iCloud 동기화 사용 시 아래 주석 해제 및 Team ID 설정 필요
        # CODE_SIGN_ENTITLEMENTS: CryptoTrack/CryptoTrack.entitlements
        # DEVELOPMENT_TEAM: "YOUR_TEAM_ID"
      configs:
        debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        release:
          SWIFT_COMPILATION_MODE: wholemodule

  CryptoTrackTests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CryptoTrackTests
    dependencies:
      - target: CryptoTrack_iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cryptotrack.tests
        GENERATE_INFOPLIST_FILE: true

  CryptoTrackTests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CryptoTrackTests
    dependencies:
      - target: CryptoTrack_macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cryptotrack.tests
        GENERATE_INFOPLIST_FILE: true
